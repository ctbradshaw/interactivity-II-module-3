<!DOCTYPE html>
<html lang="en">
<head>
  <title>In Class Function</title>
</head>

<body>

  <p id="result"></p>

  <script>
    // Function that ADDS 4 numbers
    function addNumbers(a, b, c, d) {
      return a + b + c + d;
    }

    // Call the function
    let result = addNumbers(15, 100, 32, 2);

    // Display result on page
    document.getElementById("result").innerHTML = "The sum is " + result;
  </script>

</body>
</html>
